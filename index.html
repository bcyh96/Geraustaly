<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Munich → Milan · Nov 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>

*{box-sizing:border-box;margin:0;padding:0;}

:root{

  --bg:#0c0f1a;--sur:#141826;--sur2:#1c2235;--sur3:#242b3f;

  --bdr:rgba(255,255,255,.08);--bdr2:rgba(255,255,255,.14);

  --txt:#dfe4f0;--muted:#7a8299;--dim:#3d455e;

  --gold:#d4a843;--goldl:#f0c866;--golddim:rgba(212,168,67,.13);

}

html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;overflow:hidden;}

.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

/* ── HEADER ── */

.hdr{background:var(–sur);border-bottom:1px solid var(–bdr2);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px;}

.hdr-brand{font-family:‘Cormorant Garamond’,serif;font-size:20px;font-weight:500;color:var(–goldl);white-space:nowrap;}

.hdr-sub{font-size:10px;color:var(–muted);letter-spacing:.09em;text-transform:uppercase;margin-top:1px;}

.tabs{display:flex;gap:3px;background:var(–sur3);border-radius:8px;padding:3px;flex-shrink:0;}

.tbtn{padding:5px 13px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:‘DM Sans’,sans-serif;background:transparent;color:var(–muted);white-space:nowrap;transition:all .18s;}

.tbtn.on{background:var(–gold);color:#0c0f1a;}

/* ── LAYOUT ── */

.body{display:flex;flex:1;overflow:hidden;min-height:0;}

.sb{width:210px;flex-shrink:0;background:var(–sur);border-right:1px solid var(–bdr);overflow-y:auto;-webkit-overflow-scrolling:touch;}

.sb::-webkit-scrollbar{width:3px;}.sb::-webkit-scrollbar-thumb{background:var(–bdr2);border-radius:4px;}

.city-hdr{padding:10px 13px 5px;font-size:9.5px;font-weight:600;color:var(–muted);letter-spacing:.1em;text-transform:uppercase;position:sticky;top:0;background:var(–sur);z-index:1;}

.day-row{padding:8px 13px;cursor:pointer;display:flex;align-items:center;gap:7px;border-left:2px solid transparent;transition:all .12s;}

.day-row:hover{background:var(–sur2);}

.day-row.sel{background:var(–golddim);border-left-color:var(–gold);}

.day-row .dn{font-size:10px;color:var(–dim);width:34px;flex-shrink:0;}

.day-row .dl{font-size:12px;color:var(–txt);}

.day-row.sel .dl{color:var(–goldl);font-weight:500;}

.ldot{width:5px;height:5px;border-radius:50%;margin-left:auto;flex-shrink:0;}

.detail{flex:1;overflow-y:auto;overflow-x:hidden;padding:22px 24px;-webkit-overflow-scrolling:touch;}

.detail::-webkit-scrollbar{width:3px;}.detail::-webkit-scrollbar-thumb{background:var(–bdr2);border-radius:4px;}

/* ── COMMON ── */

.sec-title{font-size:9.5px;font-weight:600;color:var(–gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:8px;}

.sec-title::after{content:’’;flex:1;height:1px;background:var(–bdr);}

.sec{margin-bottom:18px;}

.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;margin-bottom:16px;}

.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;border:1px solid;}

.badge-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}

.chip{background:var(–sur3);border:1px solid var(–bdr);border-radius:20px;padding:3px 10px;font-size:11px;color:var(–muted);}

.chip strong{color:var(–txt);}

/* ── DAY SUMMARY STRIP ── */

.day-summary{font-size:13px;color:var(–muted);line-height:1.6;margin-bottom:16px;padding:10px 14px;background:var(–sur2);border-radius:8px;border-left:3px solid var(–gold);}

/* ── TRANSPORT ── */

.t-card{background:var(–sur2);border:1px solid var(–bdr);border-radius:10px;padding:13px;}

.t-opts{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}

.t-opt{padding:6px 12px;border-radius:6px;border:1px solid var(–bdr2);cursor:pointer;font-size:11.5px;background:transparent;color:var(–muted);font-family:‘DM Sans’,sans-serif;transition:all .12s;}

.t-opt:hover,.t-opt:active{border-color:var(–gold);color:var(–txt);}

.t-opt.on{background:var(–golddim);border-color:var(–gold);color:var(–goldl);}

.t-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}

.t-dur{font-size:13px;color:var(–txt);font-weight:500;}

.t-cost{font-size:12px;color:var(–gold);font-weight:600;}

.t-note{font-size:11px;color:var(–muted);margin-top:6px;font-style:italic;line-height:1.5;}

/* ── ACTIVITIES ── */

.acts{display:flex;flex-direction:column;gap:7px;}

.act{background:var(–sur2);border:1px solid var(–bdr);border-radius:8px;padding:11px 13px;display:flex;gap:11px;cursor:pointer;transition:border-color .12s;}

.act:hover,.act:active{border-color:var(–bdr2);}

.act:hover .eh{opacity:1;}

.act-ico{font-size:18px;flex-shrink:0;margin-top:1px;}

.act-time{font-size:9.5px;color:var(–muted);font-weight:500;text-transform:uppercase;letter-spacing:.08em;margin-bottom:1px;}

.act-name{font-size:13px;font-weight:600;color:var(–txt);margin-bottom:2px;}

.act-desc{font-size:11.5px;color:var(–muted);line-height:1.5;}

/* ── FOOD ── */

.foods{display:flex;flex-direction:column;gap:7px;}

.food-row{background:var(–sur2);border:1px solid var(–bdr);border-radius:8px;padding:10px 13px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;cursor:pointer;transition:border-color .12s;}

.food-row:hover,.food-row:active{border-color:var(–bdr2);}

.food-row:hover .eh{opacity:1;}

.food-l{display:flex;align-items:flex-start;gap:10px;flex:1;min-width:0;}

.food-ico{font-size:15px;flex-shrink:0;margin-top:1px;}

.food-meal{font-size:9.5px;color:var(–muted);text-transform:uppercase;letter-spacing:.08em;}

.food-name{font-size:12.5px;color:var(–txt);font-weight:500;}

.food-desc{font-size:11px;color:var(–muted);}

.food-sgd{font-size:12.5px;color:var(–gold);font-weight:600;white-space:nowrap;flex-shrink:0;}

.eh{font-size:10px;color:var(–muted);opacity:0;transition:opacity .15s;flex-shrink:0;padding-left:4px;}

/* ── EDIT FORM ── */

.edit-card{background:var(–sur2);border:1px solid var(–gold);border-radius:8px;padding:13px;display:flex;flex-direction:column;gap:8px;}

.edit-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}

.edit-lbl{font-size:10px;color:var(–muted);width:44px;flex-shrink:0;font-weight:500;}

.edit-inp{background:var(–sur3);border:1px solid var(–bdr2);border-radius:5px;padding:6px 9px;font-size:16px;color:var(–txt);font-family:‘DM Sans’,sans-serif;flex:1;min-width:60px;outline:none;}

.edit-inp:focus{border-color:var(–gold);}

.edit-inp.emoji{width:46px;flex:none;text-align:center;}

.edit-ta{background:var(–sur3);border:1px solid var(–bdr2);border-radius:5px;padding:6px 9px;font-size:16px;color:var(–txt);font-family:‘DM Sans’,sans-serif;flex:1;outline:none;resize:vertical;min-height:60px;line-height:1.5;width:100%;}

.edit-ta:focus{border-color:var(–gold);}

.edit-actions{display:flex;gap:6px;flex-wrap:wrap;}

.ebtn{padding:7px 15px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:‘DM Sans’,sans-serif;transition:all .12s;}

.ebtn-save{background:var(–gold);color:#0c0f1a;}

.ebtn-cancel{background:var(–sur3);color:var(–muted);border:1px solid var(–bdr2);}

.ebtn-del{background:rgba(251,113,133,.1);color:#fb7185;border:1px solid rgba(251,113,133,.2);margin-left:auto;}

.add-btn{display:flex;align-items:center;gap:6px;padding:10px 13px;background:transparent;border:1px dashed var(–bdr2);border-radius:7px;color:var(–muted);font-size:11.5px;cursor:pointer;font-family:‘DM Sans’,sans-serif;width:100%;transition:all .12s;margin-top:4px;}

.add-btn:hover,.add-btn:active{border-color:var(–gold);color:var(–goldl);background:var(–golddim);}

/* ── ACCOMMODATION ── */

.accom-card{background:var(–sur2);border:1px solid var(–bdr);border-radius:10px;padding:13px;}

.inp-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap;}

.inp-lbl{font-size:11px;color:var(–muted);width:55px;flex-shrink:0;font-weight:500;}

.t-inp{background:var(–sur3);border:1px solid var(–bdr2);border-radius:6px;padding:7px 10px;font-size:16px;color:var(–txt);font-family:‘DM Sans’,sans-serif;flex:1;min-width:0;outline:none;}

.t-inp:focus{border-color:var(–gold);}

.t-inp::placeholder{color:var(–dim);}

.booked-lbl{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:11.5px;color:var(–muted);white-space:nowrap;}

.chk{width:20px;height:20px;border:1px solid var(–bdr2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .12s;cursor:pointer;}

.chk.on{background:var(–gold);border-color:var(–gold);color:#0c0f1a;}

.suggest-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;}

.sg-btn{background:var(–sur3);border:1px solid var(–bdr);border-radius:20px;padding:5px 11px;font-size:10.5px;color:var(–muted);cursor:pointer;font-family:‘DM Sans’,sans-serif;transition:all .12s;}

.sg-btn:hover,.sg-btn:active{border-color:var(–gold);color:var(–goldl);}

/* ── TIP ── */

.tip{background:var(–golddim);border:1px solid rgba(212,168,67,.18);border-radius:8px;padding:10px 13px;font-size:11.5px;color:var(–muted);line-height:1.6;display:flex;gap:8px;}

/* ── BUDGET ── */

.budget{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}

.bscroll{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;}

.bscroll::-webkit-scrollbar{width:3px;height:3px;}.bscroll::-webkit-scrollbar-thumb{background:var(–bdr2);}

.btable{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;min-width:500px;}

.btable th{text-align:right;padding:9px 12px;font-size:9.5px;font-weight:600;color:var(–gold);letter-spacing:.1em;text-transform:uppercase;background:var(–sur);border-bottom:1px solid var(–bdr2);position:sticky;top:0;z-index:2;white-space:nowrap;}

.btable th:first-child{text-align:left;}

.btable td{padding:8px 12px;border-bottom:1px solid var(–bdr);color:var(–txt);vertical-align:middle;}

.btable tr:hover td{background:var(–sur2);cursor:pointer;}

.b-inp{background:var(–sur3);border:1px solid transparent;border-radius:5px;padding:4px 6px;font-size:12px;color:var(–txt);font-family:‘DM Sans’,sans-serif;width:65px;text-align:right;outline:none;}

.b-inp:focus{border-color:var(–gold);background:var(–sur2);}

.b-dc{font-weight:500;font-size:12px;}.b-dc2{font-size:10px;color:var(–muted);margin-top:1px;}

.b-tot{font-weight:600;color:var(–gold);text-align:right;}

.gtotal{background:var(–sur);border-top:1px solid var(–bdr2);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px;}

.gt-lbl{font-size:12px;color:var(–muted);}.gt-sub{font-size:10px;color:var(–dim);margin-top:2px;}

.gt-amt{font-family:‘Cormorant Garamond’,serif;font-size:28px;color:var(–goldl);font-weight:600;}

.gt-per{font-size:10px;color:var(–muted);margin-top:1px;text-align:right;}

/* ── OVERVIEW (cover page) ── */

.overview{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

.overview::-webkit-scrollbar{width:3px;}.overview::-webkit-scrollbar-thumb{background:var(–bdr2);}

.ov-hero{position:relative;padding:36px 28px 28px;border-bottom:1px solid var(–bdr);overflow:hidden;background:linear-gradient(150deg,#0d1225 0%,#1a1230 55%,#0c1a10 100%);}

.ov-hero::before{content:’’;position:absolute;inset:0;background:url(‘https://images.unsplash.com/photo-1467269204594-9661b134dd2b?auto=format&fit=crop&w=1200&q=40’) center/cover no-repeat;opacity:.08;pointer-events:none;}

.ov-kicker{font-size:10px;color:var(–gold);letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px;position:relative;}

.ov-title{font-family:‘Cormorant Garamond’,serif;font-size:44px;font-weight:500;color:var(–txt);line-height:1.0;margin-bottom:5px;position:relative;}

.ov-subtitle{font-size:13px;color:var(–muted);margin-bottom:24px;position:relative;}

.ov-flights{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px;position:relative;}

.ov-flight{background:rgba(255,255,255,.05);border:1px solid var(–bdr2);border-radius:9px;padding:10px 14px;display:flex;align-items:center;gap:11px;}

.ov-fl-ico{font-size:22px;}

.ov-fl-num{font-size:14px;font-weight:600;color:var(–goldl);}

.ov-fl-route{font-size:11px;color:var(–muted);margin-top:1px;}

.ov-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;position:relative;}

.ov-stat{background:rgba(255,255,255,.04);border:1px solid var(–bdr);border-radius:9px;padding:12px 13px;}

.ov-stat-val{font-family:‘Cormorant Garamond’,serif;font-size:28px;color:var(–goldl);font-weight:500;line-height:1;}

.ov-stat-lbl{font-size:10px;color:var(–muted);margin-top:3px;text-transform:uppercase;letter-spacing:.08em;}

.ov-cities-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;padding:20px 28px;border-bottom:1px solid var(–bdr);}

.ov-city-card{border-radius:10px;overflow:hidden;position:relative;height:130px;background:var(–sur2);}

.ov-city-card img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.65);}

.ov-city-flag{position:absolute;top:8px;right:9px;font-size:18px;}

.ov-city-overlay{position:absolute;bottom:0;left:0;right:0;padding:10px 12px;background:linear-gradient(0deg,rgba(0,0,0,.8),transparent);}

.ov-city-name{font-family:‘Cormorant Garamond’,serif;font-size:19px;color:#fff;font-weight:500;line-height:1.1;}

.ov-city-nights{font-size:10px;color:rgba(255,255,255,.6);margin-top:1px;}

.ov-section{padding:20px 28px;border-bottom:1px solid var(–bdr);}

.ov-highlights{display:flex;flex-direction:column;gap:10px;margin-top:12px;}

.ov-hl{display:flex;gap:12px;align-items:flex-start;}

.ov-hl-ico{font-size:18px;flex-shrink:0;margin-top:1px;}

.ov-hl-body strong{color:var(–txt);display:block;font-size:13px;margin-bottom:2px;}

.ov-hl-body span{font-size:12px;color:var(–muted);line-height:1.5;}

.ov-legs{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px;margin-top:12px;}

.ov-leg{background:var(–sur2);border:1px solid var(–bdr);border-radius:8px;padding:10px 12px;}

.ov-leg-route{font-size:12px;font-weight:600;color:var(–txt);}

.ov-leg-detail{font-size:10.5px;color:var(–muted);margin-top:3px;}

.ov-days-list{display:flex;flex-direction:column;gap:0;margin-top:12px;}

.ov-day-row{display:flex;align-items:baseline;gap:10px;padding:8px 0;border-bottom:1px solid var(–bdr);}

.ov-day-row:last-child{border-bottom:none;}

.ov-day-label{font-size:11px;font-weight:600;color:var(–gold);width:50px;flex-shrink:0;}

.ov-day-city{font-size:11px;color:var(–muted);width:80px;flex-shrink:0;}

.ov-day-summary{font-size:12px;color:var(–txt);line-height:1.4;flex:1;}

/* ── MOBILE NAV ── */

.mob-nav{display:none;gap:5px;margin-bottom:14px;align-items:center;}

.arr-btn{background:var(–sur2);border:1px solid var(–bdr2);border-radius:6px;padding:8px 14px;color:var(–txt);cursor:pointer;font-size:14px;font-family:‘DM Sans’,sans-serif;flex-shrink:0;-webkit-tap-highlight-color:transparent;}

.arr-btn:active{border-color:var(–gold);color:var(–gold);}

.arr-btn:disabled{opacity:.3;pointer-events:none;}

.mob-days-btn{flex:1;background:var(–sur2);border:1px solid var(–bdr2);border-radius:6px;padding:8px 10px;color:var(–muted);cursor:pointer;font-size:11px;font-family:‘DM Sans’,sans-serif;text-align:center;-webkit-tap-highlight-color:transparent;}

/* ── MOBILE DRAWER ── */

.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99;}

.mob-drawer{display:none;position:fixed;bottom:0;left:0;right:0;background:var(–sur);border-top:1px solid var(–bdr2);z-index:100;max-height:60vh;transform:translateY(100%);transition:transform .25s ease;}

.mob-drawer.open{transform:translateY(0);}

.mob-overlay.open{display:block;}

.mob-drawer-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(–bdr);}

.mob-drawer-title{font-size:12px;font-weight:600;color:var(–muted);letter-spacing:.08em;text-transform:uppercase;}

.mob-drawer-close{background:none;border:none;color:var(–muted);font-size:18px;cursor:pointer;padding:2px 8px;}

.mob-drawer-scroll{overflow-y:auto;max-height:calc(60vh - 44px);-webkit-overflow-scrolling:touch;}

@media(max-width:700px){

.sb{display:none;}

.mob-nav{display:flex;}

.mob-drawer{display:block;}

.detail{padding:14px 15px;}

.hdr-sub{display:none;}

.hdr-brand{font-size:15px;}

.tbtn{padding:5px 8px;font-size:10px;}

.ov-hero{padding:22px 16px 20px;}

.ov-title{font-size:32px;}

.ov-cities-grid{grid-template-columns:repeat(2,1fr);padding:14px 15px;gap:8px;}

.ov-city-card{height:105px;}

.ov-stats{grid-template-columns:repeat(2,1fr);}

.ov-section{padding:14px 15px;}

.ov-legs{grid-template-columns:1fr;}

input,textarea{font-size:16px!important;}

.bscroll{overflow-x:auto;}

.gtotal{padding:10px 14px;}

.gt-amt{font-size:22px;}

}
</style>
</head>

<div class="app" id="app"></div>

let selectedDay = 1;

let activeTab = “overview”; // overview | itinerary | budget

let editingItem = null;

let transportSel = {

“munich-salzburg”:0,“salzburg-hallstatt”:0,“hallstatt-innsbruck”:0,

“innsbruck-bolzano”:0,“bolzano-verona”:0,“verona-milan”:0

};

let accommodations = Object.fromEntries(CITIES.map(c=>[c.id,{name:””,price:150,booked:false,link:””}]));

let dayCosts = Object.fromEntries(DAYS.map(d=>[d.id,{food:75,activities:20,other:0}]));

let dayEdits = {}; // {[dayId]: {acts:[…], food:[…]}}

function getDayActs(day){ return dayEdits[day.id]?.acts ?? day.acts; }

function getDayFood(day){ return dayEdits[day.id]?.food ?? day.food; }

function saveLocal(){

try{ localStorage.setItem(SK, JSON.stringify({transportSel,accommodations,dayCosts,dayEdits})); }catch(e){}

}

function loadLocal(){

try{

const raw = localStorage.getItem(SK);

if(!raw) return;

const d = JSON.parse(raw);

if(d.transportSel)  transportSel  = {…transportSel, …d.transportSel};

if(d.accommodations)accommodations = {…accommodations,…d.accommodations};

if(d.dayCosts)      dayCosts       = {…dayCosts,      …d.dayCosts};

if(d.dayEdits)      dayEdits       = {…dayEdits,       …d.dayEdits};

}catch(e){}

}

// ─── HELPERS ─────────────────────────────────────────────────────────────────

function getTransportCost(day){

if(!day.leg) return 0;

const opt = LEGS[day.leg]?.opts[transportSel[day.leg]||0];

if(!opt || opt.min===0) return 0;

return Math.round((opt.min+opt.max)/2);

}

function getDayTotal(day){

const c = dayCosts[day.id] || {food:75,activities:20,other:0};

const a = accommodations[day.cityId] || {price:150};

return getTransportCost(day)+(parseFloat(a.price)||0)+(parseFloat(c.food)||0)+(parseFloat(c.activities)||0)+(parseFloat(c.other)||0);

}

function getGrandTotal(){ return DAYS.reduce((s,d)=>s+getDayTotal(d),0); }

function lc(l){ return l===“light”?”#3dd68c”:l===“moderate”?”#fbbf24”:”#fb7185”; }

function ll(l){ return l===“light”?“Easy day”:l===“moderate”?“Travel day”:“Busy day”; }

function esc(s){ return String(s||””).replace(/&/g,”&”).replace(/</g,”<”).replace(/>/g,”>”).replace(/”/g,”"”); }

// ─── RENDER ──────────────────────────────────────────────────────────────────

function render(){

${transHtml}
<div class="sec">

<div class="acts">${actsHtml}</div>
<button class="add-btn" data-add="act">＋ Add activity</button>

// ─── EVENTS ──────────────────────────────────────────────────────────────────

function attachEvents(){

// tabs

document.querySelectorAll(”.tbtn”).forEach(btn=>{

btn.addEventListener(“click”,()=>{ activeTab=btn.dataset.tab; editingItem=null; render(); });

});

// sidebar day rows (desktop)

document.querySelectorAll(”.sb .day-row”).forEach(row=>{

row.addEventListener(“click”,()=>{ selectedDay=parseInt(row.dataset.dayid); editingItem=null; render(); });

});

// prev / next

document.querySelectorAll(”.arr-btn”).forEach(btn=>{

btn.addEventListener(“click”,()=>{

const n = selectedDay + parseInt(btn.dataset.dir);

if(n>=1&&n<=14){ selectedDay=n; editingItem=null; render(); }

});

});

// mobile drawer

const drawer  = document.getElementById(“mob-drawer”);

const overlay = document.getElementById(“mob-overlay”);

const openD   = ()=>{ drawer?.classList.add(“open”); overlay?.classList.add(“open”); };

const closeD  = ()=>{ drawer?.classList.remove(“open”); overlay?.classList.remove(“open”); };

document.getElementById(“mob-days-open”)  ?.addEventListener(“click”, openD);

document.getElementById(“mob-drawer-close”)?.addEventListener(“click”, closeD);

overlay?.addEventListener(“click”, closeD);

document.querySelectorAll(”[data-closedrawer]”).forEach(row=>{

row.addEventListener(“click”,()=>{

selectedDay=parseInt(row.dataset.dayid); editingItem=null; closeD(); render();

});

});

// transport

document.querySelectorAll(”.t-opt”).forEach(btn=>{

btn.addEventListener(“click”,()=>{

transportSel[btn.dataset.leg]=parseInt(btn.dataset.idx);

saveLocal(); render();

});

});

// accommodation text inputs

document.querySelectorAll(”[data-accom]”).forEach(inp=>{

inp.addEventListener(“input”,()=>{

const cId=inp.dataset.cityid, field=inp.dataset.accom;

accommodations[cId]={…accommodations[cId],[field]:field===“price”?(parseFloat(inp.value)||0):inp.value};

saveLocal();

});

});

document.querySelectorAll(”[data-toggle-city]”).forEach(el=>{

el.addEventListener(“click”,()=>{

const cId=el.dataset.toggleCity;

accommodations[cId]={…accommodations[cId],booked:!accommodations[cId].booked};

saveLocal(); render();

});

});

document.querySelectorAll(”.sg-btn”).forEach(btn=>{

btn.addEventListener(“click”,()=>{

accommodations[btn.dataset.cityid]={…accommodations[btn.dataset.cityid],name:btn.dataset.sugest};

saveLocal(); render();

});

});

// inline edit: open

document.querySelectorAll(”[data-open]”).forEach(el=>{

el.addEventListener(“click”,()=>{

const day=DAYS.find(d=>d.id===selectedDay);

editingItem={type:el.dataset.open, dayId:day.id, idx:parseInt(el.dataset.idx)};

render();

});

});

// cancel

document.querySelectorAll(”[data-cancel]”).forEach(btn=>{

btn.addEventListener(“click”,()=>{ editingItem=null; render(); });

});

// save act

document.querySelectorAll(”[data-save=‘act’]”).forEach(btn=>{

btn.addEventListener(“click”,()=>{

const day=DAYS.find(d=>d.id===selectedDay);

const i=parseInt(btn.dataset.idx);

const acts=[…getDayActs(day)];

acts[i]={

ico:  document.getElementById(“ei-ico”) .value||“📍”,

time: document.getElementById(“ei-time”).value,

name: document.getElementById(“ei-name”).value||“Untitled”,

desc: document.getElementById(“ei-desc”).value,

};

dayEdits[day.id]={…dayEdits[day.id],acts};

editingItem=null; saveLocal(); render();

});

});

// save food

document.querySelectorAll(”[data-save=‘food’]”).forEach(btn=>{

btn.addEventListener(“click”,()=>{

const day=DAYS.find(d=>d.id===selectedDay);

const i=parseInt(btn.dataset.idx);

const food=[…getDayFood(day)];

food[i]={

ico:  document.getElementById(“fi-ico”) .value||“🍽️”,

name: document.getElementById(“fi-name”).value||“Untitled”,

// delete act

document.querySelectorAll(”[data-del=‘act’]”).forEach(btn=>{

btn.addEventListener(“click”,()=>{

});

// add act

document.querySelectorAll(”[data-add=‘act’]”).forEach(btn=>{

btn.addEventListener(“click”,()=>{

const day=DAYS.find(d=>d.id===selectedDay);

const acts=[…getDayActs(day),{ico:“📍”,time:””,name:“New activity”,desc:””}];

dayEdits[day.id]={…dayEdits[day.id],acts};

editingItem={type:“act”,dayId:day.id,idx:acts.length-1};

saveLocal(); render();

});

});

// add food

document.querySelectorAll(”[data-add=‘food’]”).forEach(btn=>{

btn.addEventListener(“click”,()=>{

const day=DAYS.find(d=>d.id===selectedDay);

const food=[…getDayFood(day),{ico:“🍽️”,meal:””,name:“New entry”,desc:””,est:0}];

dayEdits[day.id]={…dayEdits[day.id],food};

editingItem={type:“food”,dayId:day.id,idx:food.length-1};

saveLocal(); render();

});

});

// budget accom

document.querySelectorAll(”[data-b-accom]”).forEach(inp=>{

inp.addEventListener(“click”,e=>e.stopPropagation());

inp.addEventListener(“input”,()=>{

const cId=inp.dataset.bAccom;

accommodations[cId]={…accommodations[cId],price:parseFloat(inp.value)||0};

saveLocal();

DAYS.filter(d=>d.cityId===cId).forEach(d=>{

const tot=document.querySelector(`tr[data-click-day="${d.id}"] .b-tot`);

if(tot) tot.textContent=Math.round(getDayTotal(d));

});

updateGrandTotal();

});

});

// budget costs

document.querySelectorAll(”[data-b-cost]”).forEach(inp=>{

inp.addEventListener(“click”,e=>e.stopPropagation());

inp.addEventListener(“input”,()=>{

const dId=parseInt(inp.dataset.bCost), field=inp.dataset.bField;

dayCosts[dId]={…dayCosts[dId],[field]:parseFloat(inp.value)||0};

saveLocal();

const d=DAYS.find(x=>x.id===dId);

const tot=document.querySelector(`tr[data-click-day="${dId}"] .b-tot`);

if(tot&&d) tot.textContent=Math.round(getDayTotal(d));

updateGrandTotal();

});

});

// budget row click → go to day

document.querySelectorAll(“tr[data-click-day]”).forEach(tr=>{

tr.addEventListener(“click”,()=>{

selectedDay=parseInt(tr.dataset.clickDay); activeTab=“itinerary”; editingItem=null; render();

});

});

}

function updateGrandTotal(){

const grand=getGrandTotal();

const el=document.getElementById(“grand-total”);

if(el) el.textContent=`SGD ${Math.round(grand).toLocaleString()}`;

}

// ─── INIT ────────────────────────────────────────────────────────────────────

loadLocal();

render();
</script>
</body>
</html>
